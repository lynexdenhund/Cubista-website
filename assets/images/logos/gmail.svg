<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Gmail envelope icon -->
  <g transform="translate(8,10)">
    <rect x="0" y="5" width="40" height="30" rx="2" fill="#EA4335"/>
    <rect x="2" y="7" width="36" height="26" rx="1" fill="white"/>
    <!-- Envelope flap lines -->
    <polyline points="2,7 20,22 38,7" fill="none" stroke="#EA4335" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="2" y1="33" x2="14" y2="22" stroke="#EA4335" stroke-width="1.5"/>
    <line x1="38" y1="33" x2="26" y2="22" stroke="#EA4335" stroke-width="1.5"/>
    <!-- Color accents on corners -->
    <rect x="0" y="5" width="5" height="30" rx="1" fill="#4285F4" opacity="0.8"/>
    <rect x="35" y="5" width="5" height="30" rx="1" fill="#34A853" opacity="0.8"/>
    <rect x="0" y="30" width="40" height="5" rx="1" fill="#FBBC05" opacity="0.6"/>
  </g>
  <!-- Gmail text -->
  <text x="58" y="37" font-family="'Product Sans', Arial, sans-serif" font-size="24" font-weight="normal" fill="#5F6368">Gmail</text>
</svg>
